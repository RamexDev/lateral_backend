<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover lets us use safe-area-inset for the iOS home indicator -->

      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Telegram WebApp SDK — also defines window.Telegram.WebApp -->

    <!-- Noto Sans Ethiopic for crisp Amharic script rendering across platforms -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Zwuwur</title>

  <body>
    <!-- React root -->
    <div id="root"></div>

    <!-- Application entry -->
    <script type="module" src="/src/main.tsx"></script>
